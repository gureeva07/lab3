services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: social_network
      POSTGRES_USER: social_user
      POSTGRES_PASSWORD: social_pass
    ports:
      - "5432:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./data.sql:/docker-entrypoint-initdb.d/02_data.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U social_user -d social_network"]
      interval: 5s
      timeout: 5s
      retries: 10

  service_template:
    build: .
    privileged: true
    ports:
      - "8080:8080"
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # подключение к PostgreSQL
      PG_DSN: "postgresql://social_user:social_pass@postgres:5432/social_network"

volumes:
  postgres_data:
